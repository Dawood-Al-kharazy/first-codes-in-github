<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

body {

}
header {

.history-toggle {

  height: 40px;

  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.chat-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
  overflow-y: auto;
  margin-bottom: 120px;
  align-items: center;
}
.chat-container {
  width: 100%;
  max-width: 800px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg {
  max-width: 70%;
  padding: 12px 16px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.user-msg {
  align-self: flex-start; /* تم التغيير: لجعل رسائل المستخدم في نفس الجهة */
  background: #0d6efd; /* تم التغيير: لإضافة خلفية كفقاعة */
  color: white; /* تم التغيير: لجعل النص أبيض */
  border-radius: 20px 20px 20px 0; /* تم التغيير: لإضافة حواف مستديرة كفقاعة */
}
.bot-msg {
  align-self: flex-start; /* تم التغيير: لجعل رسائل البوت في نفس الجهة */
  background: transparent; /* تم التغيير: لجعل الخلفية شفافة */
  color: #333;
  border-radius: 0; /* تم التغيير: إزالة الحواف المستديرة */
}
.input-container {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  max-width: 800px;
  display: flex;
  gap: 10px;
  background: #fff;
  border-radius: 20px;
  padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  z-index: 100;
}
input {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 20px;
  outline: none;
  font-size: 16px;
}
.send-icon {
  background: #0d6efd;
  border: none;
  color: white;
  font-size: 20px;
  padding: 12px;

  transition: background 0.3s, transform 0.2s;
}
.send-icon:hover { background: #0b5ed7; transform: scale(1.1); }

  width: 250px;
  background: #fff;
  padding: 15px;
  padding-top: 60px; 
  overflow-y: auto;
  border-left: 1px solid #ccc;
  position: fixed;
  right: 0;
  top: 60px;
  bottom: 0;
  transform: translateX(100%);
  transition: transform 0.3s;
  z-index: 90;
}
.history-panel.show {
  transform: translateX(0);
}
.history-item {
  padding: 10px;
  margin-bottom: 8px;
  background: #f1f1f1;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s;
}
.history-item:hover {
  background: #e0e0e0;
}

  border-left: 4px solid #0d6efd;
  padding-left: 8px;
}
.loading-dots {
  display: inline-block;
}
.loading-dots span {
  animation: fade 1s infinite;
  opacity: 0;
  display: inline-block;
}
.loading-dots span:nth-child(1) { animation-delay: 0s; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes fade {
  0% { opacity: 0; }
  50% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

<body>
<header>
  <span>💬 مساعد علم البيانات</span>
  <button class="history-toggle" id="history-toggle"><i class="fas fa-history"></i></button>
</header>
<div class="chat-wrapper" id="chat-wrapper">
  <div class="chat-container" id="chat-box"></div>
</div>
<div class="input-container">
  <input type="text" id="user-input" placeholder="اكتب رسالتك هنا..." onkeydown="if(event.key==='Enter') sendMessage()">
  <button class="send-icon" id="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  <button class="send-icon" onclick="startNewConversation()"><i class="fas fa-plus"></i></button>
</div>
<div class="history-panel" id="history-panel">
  <h3>سجل المحادثات</h3>
  <div id="history-list"></div>
</div>
<script>
const chatBox = document.getElementById('chat-box');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const historyList = document.getElementById('history-list');
const historyPanel = document.getElementById('history-panel');
const historyToggle = document.getElementById('history-toggle');
let conversationHistory = {};
let userId = generateUniqueId();
let isLoading = false;

function generateUniqueId() {
  return 'user_' + Date.now() + '_' + Math.floor(Math.random()*1000);
}

historyToggle.onclick = () => {
  historyPanel.classList.toggle('show');
};

function formatMarkdown(text) {
  const div = document.createElement('div');
  let html = text
    .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
    .replace(/\*(.*?)\*/g, '<i>$1</i>')
    .replace(/```(.*?)```/gs, '<pre><code>$1</code></pre>');
  
  div.innerHTML = html;
  return div;
}

function displayMessage(message, sender) {
  const div = document.createElement('div');
  div.className = `msg ${sender}-msg`;
  div.appendChild(formatMarkdown(message));
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const message = userInput.value.trim();
  if (!message) return;

  userInput.value = '';
  isLoading = true;
  userInput.disabled = true;
  sendBtn.disabled = true;

  displayMessage(message, 'user');

  const botDiv = document.createElement('div');
  botDiv.className = 'msg bot-msg';
  botDiv.innerHTML = '<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
  chatBox.appendChild(botDiv);
  chatBox.scrollTop = chatBox.scrollHeight;

  try {
    const response = await fetch('http://127.0.0.1:8000/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, message })
    });

    const data = await response.json();
    if (data.error) {
      botDiv.innerHTML = 'حدث خطأ: ' + data.error;
    } else {
      botDiv.innerHTML = '';
      // استدعاء دالة الكتابة التدريجية مع الرد الأصلي
      typeWriter(botDiv, data.reply);
      
      let conversationName = message.split(' ').slice(0, 5).join(' ') + (message.length > 30 ? '...' : '');
      conversationHistory[userId] = { history: data.history, name: conversationName };
      renderHistory();
    }
  } catch (err) {
    botDiv.innerHTML = 'حدث خطأ، حاول مرة أخرى.';
    console.error(err);
  } finally {
    isLoading = false;
    userInput.disabled = false;
    sendBtn.disabled = false;
    userInput.focus();
    chatBox.scrollTop = chatBox.scrollHeight;
  }
}

// دالة الكتابة التدريجية المعدلة
function typeWriter(element, text, delay = 10) {
    let i = 0;
    const words = text.split(' ');
    const cursor = document.createElement('span');
    cursor.className = 'typing-cursor';

    // استخدام عنصر مؤقت للعرض أثناء الكتابة
    const tempSpan = document.createElement('span');
    element.appendChild(tempSpan);

    function typing() {
        if (i < words.length) {
            tempSpan.innerHTML += words[i] + ' ';
            chatBox.scrollTop = chatBox.scrollHeight;
            i++;
            setTimeout(typing, delay);
        } else {
            // بعد الانتهاء من الكتابة، قم بتطبيق تنسيق الـ Markdown
            element.innerHTML = ''; // إزالة المحتوى المؤقت
            element.appendChild(formatMarkdown(text));
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
    typing();
}

function renderHistory() {
  historyList.innerHTML = '';
  for (let id in conversationHistory) {
    const item = document.createElement('div');
    item.className = 'history-item';
    if (conversationHistory[id].history.some(msg => msg.startsWith('🤖'))) {
      item.classList.add('new-message');
    }
    item.textContent = conversationHistory[id].name;
    item.onclick = () => loadConversation(id);
    historyList.appendChild(item);
  }
}

function loadConversation(id) {
  userId = id;
  chatBox.innerHTML = '';
  const history = conversationHistory[id].history || [];
  history.forEach(msg => {
    const sender = msg.startsWith('👤') ? 'user' : 'bot';
    displayMessage(msg.replace(/^👤 |^🤖 /, ''), sender);
  });
}

function startNewConversation() {
  userId = generateUniqueId();
  chatBox.innerHTML = '';
}

function typeMessage(element, text, sender) {
  const words = text.split(' ');
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typing-cursor';
  element.appendChild(cursor);

  const intervalId = setInterval(() => {
    if (i < words.length) {
      element.innerHTML = formatMarkdown(words.slice(0, i + 1).join(' ')).innerHTML;
      element.appendChild(cursor);
      i++;
      setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 100);
    } else {
      clearInterval(intervalId);
      element.removeChild(cursor);
      setTimeout(() => chatBox.scrollTop = chatBox.scrollHeight, 100);
    }
  }, 50);
}

</script>
</body>
</html>
